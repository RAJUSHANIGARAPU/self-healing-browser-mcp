name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token or secret is stored in the repo.
# One-time setup: on PyPI, add a Trusted Publisher for project "self-healing-browser-mcp"
# pointing at this repository, workflow "publish.yml", and environment "pypi".
# See README -> Releasing.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/self-healing-browser-mcp
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
